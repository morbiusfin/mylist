<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mylist — mock iPhone 14 Pro Max</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; gap:20px; padding:30px 0;
      background:radial-gradient(circle at 50% 0%, #14261a, #060b08); font-family:-apple-system,"Segoe UI",Roboto,sans-serif; }
    .phone { position:relative; width:430px; height:932px; background:#000; border-radius:62px; padding:14px;
      box-shadow:0 0 0 12px #1c1c1e, 0 40px 90px rgba(0,0,0,.7); }
    .screen { width:100%; height:100%; border-radius:48px; overflow:hidden; background:#07110b; position:relative; }
    .screen iframe { width:100%; height:100%; border:0; display:block; }
    .notch { position:absolute; top:16px; left:50%; transform:translateX(-50%); width:126px; height:36px; background:#000; border-radius:20px; z-index:10; }
    .label { color:#86a394; font-size:13px; }
    a { color:#2fd06e; }
  </style>
</head>
<body>
  <div class="label">iPhone 14 Pro Max — 430×932 · <a href="index.html" target="_blank">abrir cheio</a></div>
  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <iframe src="index.html?frame=1"></iframe>
    </div>
  </div>
</body>
</html>
